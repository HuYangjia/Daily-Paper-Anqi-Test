<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Paper Tracker — Anqi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7f7f5;
    color: #2c2c2a;
    line-height: 1.7;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e8e8e4;
    padding: 2rem 0;
    text-align: center;
  }
  header h1 { font-size: 1.6rem; font-weight: 500; letter-spacing: -0.3px; }
  header p { color: #888; font-size: 0.9rem; margin-top: 0.3rem; }
  .badge {
    display: inline-block;
    background: #eeedfe;
    color: #534ab7;
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 0.5rem;
  }
  main { max-width: 760px; margin: 2.5rem auto; padding: 0 1.25rem; }
  .section-title {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #aaa;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #e8e8e4;
  }
  .paper-list { list-style: none; }
  .paper-item {
    background: #fff;
    border: 1px solid #e8e8e4;
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    transition: border-color 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .paper-item:hover { border-color: #bbb; }
  .date-badge {
    flex-shrink: 0;
    background: #f1efe8;
    border-radius: 8px;
    padding: 0.4rem 0.7rem;
    text-align: center;
    min-width: 64px;
  }
  .date-badge .month { font-size: 0.7rem; color: #888; text-transform: uppercase; }
  .date-badge .day { font-size: 1.4rem; font-weight: 500; line-height: 1.2; }
  .paper-meta { flex: 1; }
  .paper-title { font-size: 0.95rem; font-weight: 500; line-height: 1.45; margin-bottom: 0.25rem; }
  .paper-sub { font-size: 0.82rem; color: #888; }
  .score-pill {
    flex-shrink: 0;
    align-self: center;
    background: #eaf3de;
    color: #3b6d11;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #aaa;
    font-size: 0.9rem;
  }
  footer {
    text-align: center;
    font-size: 0.78rem;
    color: #bbb;
    padding: 2rem;
    margin-top: 1rem;
  }
</style>
</head>
<body>
<header>
  <h1>Daily Paper Tracker</h1>
  <p>AI 每日精选 · 中文解读 · 自动更新</p>
  <span class="badge">由 CodeBuddy Agent 驱动</span>
</header>
<main>
  <p class="section-title">历史报告归档</p>
  <ul class="paper-list" id="paper-list">
    <li>
      <a class="paper-item" href="papers/2026-04-28.html">
        <div class="date-badge">
          <div class="month">Apr</div>
          <div class="day">28</div>
        </div>
        <div class="paper-meta">
          <div class="paper-title">Denoising Diffusion Probabilistic Models（示例）</div>
          <div class="paper-sub">Ho et al. · NeurIPS 2020 · 扩散模型方向</div>
        </div>
        <div class="score-pill">92 分</div>
      </a>
    </li>
  </ul>
</main>
<footer>
  本站内容由 AI Agent 自动生成 · 每天中午 12:00 更新 ·
  <a href="https://github.com/HuYangjia/Daily-Paper-Anqi-Test" style="color:#aaa">GitHub 仓库</a>
</footer>
</body>
</html>
